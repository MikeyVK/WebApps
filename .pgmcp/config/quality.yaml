version: "1.0.0"

active_gates:
  - gate0_eslint
  - gate1_tsc

artifact_logging:
  enabled: true
  max_files: 200

project_scope:
  include_globs:
    - "src/**/*.{js,jsx,ts,tsx}"
    - "apps/**/*.{js,jsx,ts,tsx}"
    - "packages/**/*.{js,jsx,ts,tsx}"

gates:
  gate0_eslint:
    name: "Gate 0: ESLint"
    description: "ESLint syntax check and code style validation"
    execution:
      command: ["npx", "eslint", "--format=compact"]
      timeout_seconds: 60
      working_dir: null
    success:
      exit_codes_ok: [0]
    capabilities:
      file_types: [".js", ".jsx", ".ts", ".tsx"]
      supports_autofix: false
      parsing_strategy: "text_violations"
      text_violations:
        pattern: '^(?P<file>[^:]+): line (?P<line>\d+), col (?P<col>\d+), (?P<severity>Error|Warning) - (?P<message>.+?)(?:\s+\((?P<rule>[^)]+)\))?$'
        severity_default: "error"
        defaults: {}

  gate1_tsc:
    name: "Gate 1: TypeScript Compilatie"
    description: "TypeScript compiler type checking (noEmit)"
    execution:
      command: ["npx", "tsc", "--noEmit"]
      timeout_seconds: 60
      working_dir: null
    success:
      exit_codes_ok: [0]
    capabilities:
      file_types: [".ts", ".tsx"]
      supports_autofix: false
      parsing_strategy: "text_violations"
      text_violations:
        pattern: '^(?P<file>[^(]+)\((?P<line>\d+),(?P<col>\d+)\): (?P<severity>error|warning) (?P<rule>TS\d+): (?P<message>.+)$'
        severity_default: "error"
        defaults: {}
